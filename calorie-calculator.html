<script>
const conversionFactors = {
    cal: 1,
    kcal: 1000,
    kj: 239.006  // FIXED (1 kJ = 239 cal)
};

function convert(){
    const amount = parseFloat(document.getElementById('amount').value) || 0;
    const from = document.getElementById('fromUnit').value;
    const to = document.getElementById('toUnit').value;

    // convert to calories base
    let baseCal = amount * conversionFactors[from];

    // convert to target
    let result = baseCal / conversionFactors[to];

    // main result
    document.getElementById('result').textContent = result.toFixed(3) + " " + to;

    // correct quick conversions
    document.getElementById('toCal').textContent = baseCal.toFixed(3);
    document.getElementById('toKcal').textContent = (baseCal / 1000).toFixed(3);
    document.getElementById('toKj').textContent = (baseCal / 239.006).toFixed(3);

    // primary
    document.getElementById('primary').textContent = result.toFixed(3) + " " + to;
}

// reset
function reset(){
    document.getElementById('amount').value = 100;
    document.getElementById('fromUnit').value = "cal";
    document.getElementById('toUnit').value = "kcal";
    convert();
}

// auto convert (IMPORTANT FIX)
document.getElementById('amount').addEventListener('input', convert);
document.getElementById('fromUnit').addEventListener('change', convert);
document.getElementById('toUnit').addEventListener('change', convert);

// initial
convert();
</script>
